<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Budget - Energy Tracker</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navigation -->
    <header>

        <div class="logo">
            <h1>Energy Tracker</h1>
        </div>

       <nav>
           <ul>
                <!-- Set name and href file address to activate navigation
                  to another created pages -->
                  
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="calculator.html">Calculator</a></li>
                <li><a href="payment.html">Payment</a></li>
                <li><a href="tips.html">Saving Tips</a></li>
                <li><a href="budget.html">Budget</a></li>
            </ul>
        </nav>

    </header>

    <!-- Main -->
    <main>

         <!-- Set title and description as same as another page -->
        <section class="budget-page">

            <h2>Set Your Budget</h2>

            <!-- Period Buttons. In here, ask user to payment period
                 weekly or monthly -->
            <div class="period-buttons">

                <button>Weekly</button>
                <button>Monthly</button>

            </div>

            <!-- Budget Form. There will be display budget amount, 
                 amount setting and percentage when spent expencec reach
                 to user budget.-->
            <form class="budget-form">

                <label>Budget Amount ($)</label>

                <input type="number" placeholder="e.g. 400">

                <label>Notify Me When (%)</label>

                <input type="number" placeholder="e.g. 80">

                <button type="submit" class="save-btn">
                    Save Budget
                </button>

            </form>

            <!-- Budget Status -->
            <div class="budget-status">

                <h3>Budget Status</h3>

                <p>Remaining This Week</p>

                <h2>$152 / $400</h2>

                <!-- Create progress bar as same as dashboard screen.
                     just copied and pasted-->
                <div class="progress-bar">

                    <div class="progress"></div>

                </div>

            </div>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
