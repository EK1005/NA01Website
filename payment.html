<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Energy Tracker</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Energy Tracker</h1>
        </div>
        <nav>
             <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="calculator.html">Calculator</a></li>
                <li><a href="tips.html">Saving Tips</a></li>
                <li><a href="budget.html">Budget</a></li>
                <li><a href="payment.html">Payment</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="payment-page">

            <h2>Pay Your Energy Bill</h2>
            
            <div class="payment-layout">
                
                <div class="payment-card">
                    <h3>Account Summary</h3>
                    <div class="bill-amount">$152.00</div>
                    <p>Current Outstanding Balance</p>
                    
                    <div class="payment-info-row">
                        <span>Due Date:</span>
                        <strong>15 June 2026</strong>
                    </div>
                    <div class="payment-info-row">
                        <span>Account No:</span>
                        <strong>#9842-104</strong>
                    </div>
                    <div class="payment-info-row">
                        <span>Status:</span>
                        <strong class="status-unpaid">Unpaid</strong>
                    </div>
                </div>

                <form class="payment-form">
                    
                    <h3>Payment Method</h3>

                    <label>Cardholder Name</label>
                    <input type="text" placeholder="John Doe" required>

                    <label>Card Number</label>
                    <input 
                        type="text" 
                        inputmode="numeric" 
                        maxlength="16" 
                        placeholder="1234567891011121" 
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')" 
                        required>

                    <div class="payment-small-inputs">
                        
                        <div>
                            <label>Expiry Date</label>
                            <input 
                                type="text" 
                                inputmode="numeric" 
                                maxlength="5" 
                                placeholder="MM/YY" 
                                oninput="formatExpiry(this)" 
                                required>
                        </div>

                        <div>
                            <label>CVV</label>
                            <input 
                                type="text" 
                                inputmode="numeric" 
                                maxlength="3" 
                                placeholder="123" 
                                oninput="this.value = this.value.replace(/[^0-9]/g, '')" 
                                required>
                        </div>

                    </div>

                    <button type="submit" class="pay-btn">
                        Submit Payment
                    </button>

                </form>

            </div>

        </section>

    </main>

    <script>
        function formatExpiry(el) {
            let cleanInput = el.value.replace(/[^0-9]/g, '');
            if (cleanInput.length > 2) {
                el.value = cleanInput.substring(0, 2) + '/' + cleanInput.substring(2, 4);
            } else {
                el.value = cleanInput;
            }
        }
    </script>
    <script src="js/script.js"></script>

</body>
</html>
