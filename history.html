<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>History - Energy Tracker</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <div class="logo">
            <h1>Energy Tracker</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="tips.html">Saving Tips</a></li>
                <li><a href="budget.html">Budget</a></li>
                <li><a href="payment.html">Payment</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="history-page">

            <p class="section-subtitle">HISTORY</p>
            <h2>Usage Over Time</h2>

            <div class="history-toggles">
                <button class="toggle-btn active">Weekly</button>
                <button class="toggle-btn">Monthly</button>
                <button class="toggle-btn">Yearly</button>
            </div>

            <div class="chart-wrapper">
                <div class="bar-chart">
                    <div class="bar-group">
                        <div class="bar" style="height: 45%;"></div>
                        <span class="day-label">M</span>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 60%;"></div>
                        <span class="day-label">T</span>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 75%;"></div>
                        <span class="day-label">W</span>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 50%;"></div>
                        <span class="day-label">T</span>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 65%;"></div>
                        <span class="day-label">F</span>
                    </div>
                    <div class="bar-group">
                        <div class="bar highlighted" style="height: 95%;"></div>
                        <span class="day-label">S</span>
                    </div>
                    <div class="bar-group">
                        <div class="bar" style="height: 55%;"></div>
                        <span class="day-label">S</span>
                    </div>
                </div>
            </div>

            <div class="breakdown-section">
                
                <h3>BREAKDOWN</h3>

                <div class="breakdown-item">
                    <div class="breakdown-info">
                        <span class="dot heating-cooling"></span>
                        <span class="label">Heating/Cooling</span>
                    </div>
                    <div class="breakdown-progress-bar">
                        <div class="breakdown-progress heating-cooling-bar" style="width: 65%;"></div>
                    </div>
                </div>

                <div class="breakdown-item">
                    <div class="breakdown-info">
                        <span class="dot appliances"></span>
                        <span class="label">Appliances</span>
                    </div>
                    <div class="breakdown-progress-bar">
                        <div class="breakdown-progress appliances-bar" style="width: 40%;"></div>
                    </div>
                </div>

                <div class="breakdown-item">
                    <div class="breakdown-info">
                        <span class="dot lighting"></span>
                        <span class="label">Lighting</span>
                    </div>
                    <div class="breakdown-progress-bar">
                        <div class="breakdown-progress lighting-bar" style="width: 20%;"></div>
                    </div>
                </div>

            </div>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
