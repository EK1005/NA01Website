<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Energy Tracker</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navigation Bar -->
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="Energy Tracker Logo">
            <h1>Energy Tracker</h1>
        </div>

        <nav>
            <ul>
               
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="history.html">History</a></li>
                <li><a href="calculator.html">Calculator</a></li>
                <li><a href="tips.html">Saving Tips</a></li>
                <li><a href="budget.html">Budget</a></li>
                <li><a href="payment.html">Payment</a></li>
                 <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Login Content -->
    <main>
        <section class="login-page">

            <div class="login-card">

                <h2>Welcome Back</h2>

                <p class="page-description">
                    Log in to track your energy usage, budget, and appliance costs.
                </p>

                <!-- Login Form, here will be email, password label and textbox.
                      And create Submit button. -->
                <form class="login-form">

                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="e.g. user@email.com" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>

                    <button type="submit" class="login-btn">
                        Login
                    </button>

                </form>

                <!--Crreat signup direction link below of button. -->
                <p class="login-note">
                    Don't have an account? <a href="create.html">Create one</a>
                </p>

            </div>

        </section>
    </main>

 

</body>
</html>
